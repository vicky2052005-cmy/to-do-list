<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>

    <form id="task-form">
      <div class="input-group">
        <input type="text" id="task-input" placeholder="Enter a new task..." autocomplete="off">
        <button type="submit" id="add-btn">Add</button>
      </div>
      <p id="error-message" class="error hidden">Please enter a task.</p>
    </form>

    <ul id="task-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
